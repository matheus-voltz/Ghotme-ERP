name: Deploy ERP Ghotme
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick

      - name: Install Composer Dependencies
        run: |
          mkdir -p bootstrap/cache
          chmod -R 775 bootstrap/cache
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node & Build Vite Assets
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Deploy via SSH na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            cd /var/www/ghotme

            git fetch origin main
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader --no-interaction

            npm install --legacy-peer-deps
            npm run build

            php artisan migrate --force
            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan package:discover --ansi

            php -r "if(function_exists('opcache_reset')) opcache_reset();"

            sudo chown -R www-data:www-data /var/www/ghotme/storage /var/www/ghotme/bootstrap/cache

            echo "Ghotme ERP atualizado na EC2 com sucesso!"
