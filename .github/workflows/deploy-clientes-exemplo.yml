name: Deploy Clientes (Exemplo)

on:
  workflow_dispatch:
    inputs:
      cliente_empresa_a:
        description: 'Empresa A - Oficina do João'
        type: boolean
        default: false
      cliente_empresa_b:
        description: 'Empresa B - Pet Shop Silva'
        type: boolean
        default: false
      cliente_empresa_c:
        description: 'Empresa C - Eletrônicos Ramos'
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy nos clientes selecionados
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Criar script de resumo de erros
        run: |
          cat > /tmp/resumir_erro.py << 'PYEOF'
          import sys, json, urllib.request

          log_file, api_key = sys.argv[1], sys.argv[2]

          with open(log_file) as f:
              log = f.read()[-3000:]

          payload = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 80,
              "messages": [{
                  "role": "user",
                  "content": f"Resuma em UMA frase curta (máximo 100 caracteres, sem markdown, em português) o erro principal deste log de deploy Laravel:\n\n{log}"
              }]
          })

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload.encode(),
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )
          try:
              resp = json.loads(urllib.request.urlopen(req, timeout=10).read())
              print(resp["content"][0]["text"].strip())
          except Exception:
              lines = [l for l in log.strip().split('\n') if l.strip()]
              print(lines[-1][:100] if lines else "Erro desconhecido")
          PYEOF

      - name: Deploy → Empresa A
        id: empresa_a
        if: ${{ inputs.cliente_empresa_a == true }}
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.USER_EMPRESA_A }}@${{ secrets.HOST_EMPRESA_A }} \
            "cd /var/www/empresa_a && \
             git fetch origin main && \
             git reset --hard origin/main && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan migrate --force && \
             php artisan optimize:clear" \
            > /tmp/log_empresa_a.txt 2>&1

      - name: Deploy → Empresa B
        id: empresa_b
        if: ${{ inputs.cliente_empresa_b == true }}
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.USER_EMPRESA_B }}@${{ secrets.HOST_EMPRESA_B }} \
            "cd /var/www/empresa_b && \
             git fetch origin main && \
             git reset --hard origin/main && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan migrate --force && \
             php artisan optimize:clear" \
            > /tmp/log_empresa_b.txt 2>&1

      - name: Deploy → Empresa C
        id: empresa_c
        if: ${{ inputs.cliente_empresa_c == true }}
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.USER_EMPRESA_C }}@${{ secrets.HOST_EMPRESA_C }} \
            "cd /var/www/empresa_c && \
             git fetch origin main && \
             git reset --hard origin/main && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan migrate --force && \
             php artisan optimize:clear" \
            > /tmp/log_empresa_c.txt 2>&1

      - name: Notificar resultado no Telegram
        if: always()
        run: |
          RESULTADO=""

          # Empresa A
          if [ "${{ inputs.cliente_empresa_a }}" = "true" ]; then
            if [ "${{ steps.empresa_a.outcome }}" = "success" ]; then
              RESULTADO="$RESULTADO\n✅ Empresa A - Oficina do João"
            else
              RESUMO=$(python3 /tmp/resumir_erro.py /tmp/log_empresa_a.txt "${{ secrets.ANTHROPIC_API_KEY }}")
              RESULTADO="$RESULTADO\n❌ Empresa A - Oficina do João\n   └ $RESUMO"
            fi
          else
            RESULTADO="$RESULTADO\n⏭ Empresa A - Oficina do João (pulado)"
          fi

          # Empresa B
          if [ "${{ inputs.cliente_empresa_b }}" = "true" ]; then
            if [ "${{ steps.empresa_b.outcome }}" = "success" ]; then
              RESULTADO="$RESULTADO\n✅ Empresa B - Pet Shop Silva"
            else
              RESUMO=$(python3 /tmp/resumir_erro.py /tmp/log_empresa_b.txt "${{ secrets.ANTHROPIC_API_KEY }}")
              RESULTADO="$RESULTADO\n❌ Empresa B - Pet Shop Silva\n   └ $RESUMO"
            fi
          else
            RESULTADO="$RESULTADO\n⏭ Empresa B - Pet Shop Silva (pulado)"
          fi

          # Empresa C
          if [ "${{ inputs.cliente_empresa_c }}" = "true" ]; then
            if [ "${{ steps.empresa_c.outcome }}" = "success" ]; then
              RESULTADO="$RESULTADO\n✅ Empresa C - Eletrônicos Ramos"
            else
              RESUMO=$(python3 /tmp/resumir_erro.py /tmp/log_empresa_c.txt "${{ secrets.ANTHROPIC_API_KEY }}")
              RESULTADO="$RESULTADO\n❌ Empresa C - Eletrônicos Ramos\n   └ $RESUMO"
            fi
          else
            RESULTADO="$RESULTADO\n⏭ Empresa C - Eletrônicos Ramos (pulado)"
          fi

          TEXT=$(printf "🚀 Deploy — $(date '+%d/%m/%Y %H:%M') UTC\n$RESULTADO")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$TEXT"
