name: Deploy Clientes (Exemplo)

on:
  workflow_dispatch:
    inputs:
      cliente_empresa_a:
        description: 'Empresa A - Oficina do João'
        type: boolean
        default: false
      cliente_empresa_b:
        description: 'Empresa B - Pet Shop Silva'
        type: boolean
        default: false
      cliente_empresa_c:
        description: 'Empresa C - Eletrônicos Ramos'
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy nos clientes selecionados
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy → Empresa A
        id: empresa_a
        if: ${{ inputs.cliente_empresa_a == true }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_EMPRESA_A }}
          username: ${{ secrets.USER_EMPRESA_A }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/empresa_a
            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan optimize:clear

      - name: Deploy → Empresa B
        id: empresa_b
        if: ${{ inputs.cliente_empresa_b == true }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_EMPRESA_B }}
          username: ${{ secrets.USER_EMPRESA_B }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/empresa_b
            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan optimize:clear

      - name: Deploy → Empresa C
        id: empresa_c
        if: ${{ inputs.cliente_empresa_c == true }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_EMPRESA_C }}
          username: ${{ secrets.USER_EMPRESA_C }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/empresa_c
            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan optimize:clear

      - name: Notificar resultado no Telegram
        if: always()
        run: |
          RESULTADO=""

          if [ "${{ inputs.cliente_empresa_a }}" = "true" ]; then
            if [ "${{ steps.empresa_a.outcome }}" = "success" ]; then
              RESULTADO="$RESULTADO\n✅ Empresa A - Oficina do João"
            else
              RESULTADO="$RESULTADO\n❌ Empresa A - Oficina do João (ERRO)"
            fi
          else
            RESULTADO="$RESULTADO\n⏭ Empresa A - Oficina do João (pulado)"
          fi

          if [ "${{ inputs.cliente_empresa_b }}" = "true" ]; then
            if [ "${{ steps.empresa_b.outcome }}" = "success" ]; then
              RESULTADO="$RESULTADO\n✅ Empresa B - Pet Shop Silva"
            else
              RESULTADO="$RESULTADO\n❌ Empresa B - Pet Shop Silva (ERRO)"
            fi
          else
            RESULTADO="$RESULTADO\n⏭ Empresa B - Pet Shop Silva (pulado)"
          fi

          if [ "${{ inputs.cliente_empresa_c }}" = "true" ]; then
            if [ "${{ steps.empresa_c.outcome }}" = "success" ]; then
              RESULTADO="$RESULTADO\n✅ Empresa C - Eletrônicos Ramos"
            else
              RESULTADO="$RESULTADO\n❌ Empresa C - Eletrônicos Ramos (ERRO)"
            fi
          else
            RESULTADO="$RESULTADO\n⏭ Empresa C - Eletrônicos Ramos (pulado)"
          fi

          TEXT=$(printf "🚀 Deploy finalizado — $(date '+%d/%m/%Y %H:%M') UTC\n$RESULTADO")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$TEXT"
